<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#0B1626"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="G3 Elite"/>
<title>G3 Elite Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0B1626;font-family:'DM Sans',sans-serif;color:#E8F4FD;overscroll-behavior:none}
input,select{-webkit-appearance:none;appearance:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{height:4px;width:4px}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.03)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
select option{background:#0F2040;color:#E8F4FD}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo} = React;
const STORAGE_KEY = "g3elite_v2";
const PICK_TYPES = ["🏠 LOCAL + U3.5","✈ VISITA + U3.5","⚽ BTTS Sí","📈 OVER 2.5","🔒 UNDER 2.5/HTX"];

function calcPick(r){
  const ol=parseFloat(r.over_local),ov=parseFloat(r.over_visit);
  const bl=parseFloat(r.btts_local),bv=parseFloat(r.btts_visit);
  const vl=parseFloat(r.vic_local),vv=parseFloat(r.vic_visit);
  const gl=parseFloat(r.goles_local),gv=parseFloat(r.goles_visit);
  const media=(r.goles_local!==""&&r.goles_visit!=="")?(gl+gv)/2:null;
  const hasAll=[r.over_local,r.over_visit,r.btts_local,r.btts_visit,r.vic_local,r.vic_visit].every(x=>x!=="");
  const filtroOK=hasAll&&media!==null&&media<2.5&&ol<45&&ov<45&&bl>=40&&bv>=40;
  let pick="—";
  if(filtroOK){
    if(vl>=65&&vv<=30)pick="🏠 LOCAL + U3.5";
    else if(vl<=30&&vv>=65)pick="✈ VISITA + U3.5";
    else if(bl>=55&&bv>=55)pick="⚽ BTTS Sí";
    else if(ol>=55&&ov>=55)pick="📈 OVER 2.5";
    else pick="🔒 UNDER 2.5/HTX";
  }
  return{filtroOK,pick,media};
}

function calcBen(cuota,stake,res){
  if(!cuota||!stake||!res)return null;
  const c=parseFloat(cuota),s=parseFloat(stake);
  if(res==="W")return(c-1)*s;
  if(res==="L")return-s;
  if(res==="V")return 0;
  return null;
}

const emptyRow=()=>({id:Date.now()+Math.random(),fecha:"",partido:"",liga:"",cuota:"",stake:"",resultado:"",goles_local:"",goles_visit:"",over_local:"",over_visit:"",btts_local:"",btts_visit:"",vic_local:"",vic_visit:""});

function loadPicks(){
  try{const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null");return d&&d.length?d:[emptyRow()];}catch{return[emptyRow()];}
}

// ── Input components ─────────────────────────────────────────────────────────
const inputStyle={width:"100%",background:"transparent",border:"none",borderBottom:"1px solid rgba(255,255,255,0.12)",color:"#E8F4FD",fontSize:11,textAlign:"center",padding:"4px 2px",outline:"none",fontFamily:"'DM Mono',monospace"};

function Num({val,onChange,placeholder="0"}){
  return <input type="number" value={val} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={inputStyle}/>;
}
function Txt({val,onChange,placeholder}){
  return <input type="text" value={val} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{...inputStyle,textAlign:"left",fontFamily:"'DM Sans',sans-serif"}}/>;
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App(){
  const [picks,setPicks]=useState(loadPicks);
  const [tab,setTab]=useState("picks");
  const [editRow,setEditRow]=useState(null); // id of row being edited in modal

  const save=(p)=>{setPicks(p);try{localStorage.setItem(STORAGE_KEY,JSON.stringify(p));}catch{}};
  const updateRow=(id,field,val)=>save(picks.map(r=>r.id===id?{...r,[field]:val}:r));
  const addRow=()=>save([...picks,emptyRow()]);
  const delRow=(id)=>{if(picks.length>1)save(picks.filter(r=>r.id!==id));};

  const enriched=useMemo(()=>picks.map(r=>{
    const{filtroOK,pick,media}=calcPick(r);
    const ben=calcBen(r.cuota,r.stake,r.resultado);
    return{...r,filtroOK,pick,media,ben};
  }),[picks]);

  const stats=useMemo(()=>{
    const played=enriched.filter(r=>r.resultado);
    const won=played.filter(r=>r.resultado==="W");
    const lost=played.filter(r=>r.resultado==="L");
    const totalBen=played.reduce((s,r)=>s+(r.ben??0),0);
    const totalStake=played.reduce((s,r)=>s+(parseFloat(r.stake)||0),0);
    const roi=totalStake?(totalBen/totalStake)*100:0;
    const avgCuota=played.length?played.reduce((s,r)=>s+(parseFloat(r.cuota)||0),0)/played.length:0;
    let maxStreak=0,streak=0;
    enriched.forEach(r=>{if(r.resultado==="W"){streak++;maxStreak=Math.max(maxStreak,streak);}else if(r.resultado)streak=0;});
    const byPick=PICK_TYPES.map(pt=>{
      const rows=played.filter(r=>r.pick===pt);
      return{name:pt,total:rows.length,won:rows.filter(r=>r.resultado==="W").length,ben:rows.reduce((s,r)=>s+(r.ben??0),0)};
    });
    const last5=[...enriched].filter(r=>r.resultado).slice(-5).reverse();
    return{played:played.length,won:won.length,lost:lost.length,totalBen,roi,avgCuota,byPick,maxStreak,last5};
  },[enriched]);

  const fmtEur=(v)=>v===null?"—":`${v>=0?"+":""}${v.toFixed(2)}€`;
  const fmtPct=(v)=>`${v.toFixed(1)}%`;
  const benColor=(b)=>b===null?"#5A7F9A":b>0?"#6FCF97":b<0?"#E74C3C":"#F39C12";
  const resColor=(r)=>r==="W"?"#6FCF97":r==="L"?"#E74C3C":r==="V"?"#F39C12":"#5A7F9A";

  // ── Edit Modal ──────────────────────────────────────────────────────────────
  const editingRow=editRow?enriched.find(r=>r.id===editRow):null;

  const Modal=()=>{
    if(!editingRow)return null;
    const r=editingRow;
    const u=(f,v)=>updateRow(r.id,f,v);
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:100,display:"flex",flexDirection:"column",overflowY:"auto"}}>
        <div style={{background:"linear-gradient(135deg,#0F2040,#1A3A60)",margin:"auto",width:"100%",maxWidth:480,borderRadius:12,padding:20,border:"1px solid rgba(255,255,255,0.1)"}}>
          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#6FCF97",letterSpacing:2}}>EDITAR PICK</div>
            <button onClick={()=>setEditRow(null)} style={{background:"rgba(231,76,60,0.2)",color:"#E74C3C",border:"1px solid rgba(231,76,60,0.3)",borderRadius:6,padding:"4px 12px",fontSize:12,cursor:"pointer"}}>✕ Cerrar</button>
          </div>

          {/* Campos */}
          {[
            ["Fecha","fecha","text","dd/mm/aaaa"],
            ["Partido","partido","text","Local vs Visitante"],
            ["Liga/Comp.","liga","text","Tercera RFEF G3"],
            ["Cuota","cuota","number","1.80"],
            ["Stake (€)","stake","number","10"],
          ].map(([label,field,type,ph])=>(
            <div key={field} style={{marginBottom:12}}>
              <div style={{fontSize:9,color:"#5A7F9A",letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>{label}</div>
              <input type={type} value={r[field]} onChange={e=>u(field,e.target.value)} placeholder={ph}
                style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:6,color:"#E8F4FD",fontSize:13,padding:"8px 12px",outline:"none",fontFamily:"'DM Mono',monospace"}}/>
            </div>
          ))}

          {/* Resultado */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:9,color:"#5A7F9A",letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Resultado</div>
            <div style={{display:"flex",gap:8}}>
              {[["W","✅ W","#6FCF97"],["L","❌ L","#E74C3C"],["V","🔁 V","#F39C12"],["","— Pendiente","#5A7F9A"]].map(([val,label,color])=>(
                <button key={val} onClick={()=>u("resultado",val)}
                  style={{flex:1,padding:"8px 4px",fontSize:11,fontWeight:700,cursor:"pointer",borderRadius:6,
                    background:r.resultado===val?`${color}22`:"rgba(255,255,255,0.05)",
                    border:`1px solid ${r.resultado===val?color:"rgba(255,255,255,0.1)"}`,
                    color:r.resultado===val?color:"#5A7F9A"}}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          {/* Goles */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            {[["Goles Local","goles_local"],["Goles Visit.","goles_visit"]].map(([label,field])=>(
              <div key={field}>
                <div style={{fontSize:9,color:"#5A7F9A",letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>{label}</div>
                <input type="number" value={r[field]} onChange={e=>u(field,e.target.value)} placeholder="0"
                  style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:6,color:"#E8F4FD",fontSize:13,padding:"8px 12px",outline:"none",fontFamily:"'DM Mono',monospace"}}/>
              </div>
            ))}
          </div>

          {/* Stats % */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
            {[["Over2.5 Local %","over_local"],["Over2.5 Visit. %","over_visit"],["BTTS Local %","btts_local"],["BTTS Visit. %","btts_visit"],["Vic. Local %","vic_local"],["Vic. Visit. %","vic_visit"]].map(([label,field])=>(
              <div key={field}>
                <div style={{fontSize:9,color:"#5A7F9A",letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>{label}</div>
                <div style={{display:"flex",alignItems:"center",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:6,paddingRight:8}}>
                  <input type="number" value={r[field]} onChange={e=>u(field,e.target.value)} placeholder="0"
                    style={{flex:1,background:"transparent",border:"none",color:"#E8F4FD",fontSize:13,padding:"8px 12px",outline:"none",fontFamily:"'DM Mono',monospace"}}/>
                  <span style={{color:"#5A7F9A",fontSize:11}}>%</span>
                </div>
              </div>
            ))}
          </div>

          {/* Resultado automático */}
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:12,marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:10,color:"#5A7F9A"}}>Media Goles</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#7FA8C9"}}>{r.media!==null?r.media.toFixed(2):"—"}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:10,color:"#5A7F9A"}}>Filtro Élite</span>
              <span style={{fontSize:11,fontWeight:700,color:r.filtroOK?"#6FCF97":"#E74C3C"}}>{r.over_local===""?"?":(r.filtroOK?"✅ OK":"❌ NO")}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:10,color:"#5A7F9A"}}>Pick Recom.</span>
              <span style={{fontSize:11,color:r.filtroOK?"#E8F4FD":"#3A5A7A"}}>{r.pick}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:10,color:"#5A7F9A"}}>Beneficio</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:700,color:benColor(r.ben)}}>{fmtEur(r.ben)}</span>
            </div>
          </div>

          <button onClick={()=>setEditRow(null)} style={{width:"100%",background:"linear-gradient(135deg,#1A5C38,#27AE60)",color:"#fff",border:"none",borderRadius:8,padding:"12px",fontSize:13,fontWeight:700,cursor:"pointer",letterSpacing:1}}>
            ✅ Guardar
          </button>
        </div>
      </div>
    );
  };

  // ── Picks Tab ───────────────────────────────────────────────────────────────
  const PicksTab=()=>(
    <div style={{padding:"16px 12px"}}>
      <div style={{fontSize:10,color:"#6FCF97",letterSpacing:3,textTransform:"uppercase",borderLeft:"3px solid #27AE60",paddingLeft:8,marginBottom:14}}>
        Registro de apuestas
      </div>

      {/* Cards list */}
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
        {enriched.map((r,i)=>(
          <div key={r.id} onClick={()=>setEditRow(r.id)}
            style={{background:i%2===0?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.02)",
              border:"1px solid rgba(255,255,255,0.07)",
              borderLeft:`3px solid ${r.resultado?resColor(r.resultado):"rgba(255,255,255,0.15)"}`,
              borderRadius:8,padding:"10px 12px",cursor:"pointer",
              display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                {r.partido||<span style={{color:"#3A5A7A"}}>Toca para editar...</span>}
              </div>
              <div style={{fontSize:10,color:"#5A7F9A",display:"flex",gap:8,flexWrap:"wrap"}}>
                {r.fecha&&<span>{r.fecha}</span>}
                {r.liga&&<span>{r.liga}</span>}
                <span style={{color:r.filtroOK?"#6FCF97":"#3A5A7A"}}>{r.pick}</span>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,marginLeft:8}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:13,color:benColor(r.ben)}}>{fmtEur(r.ben)}</div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {r.resultado&&<span style={{fontSize:11,fontWeight:700,color:resColor(r.resultado)}}>{r.resultado==="W"?"✅":r.resultado==="L"?"❌":"🔁"}</span>}
                <span style={{fontSize:9,color:r.filtroOK?"#6FCF97":"#E74C3C"}}>{r.over_local===""?"?":r.filtroOK?"✅":"❌"}</span>
                <button onClick={e=>{e.stopPropagation();delRow(r.id);}}
                  style={{background:"rgba(192,57,43,0.15)",color:"#E74C3C",border:"none",borderRadius:4,padding:"2px 7px",fontSize:11,cursor:"pointer"}}>✕</button>
              </div>
            </div>
          </div>
        ))}
      </div>

      <button onClick={addRow} style={{width:"100%",background:"linear-gradient(135deg,#1A5C38,#27AE60)",color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer",letterSpacing:1,boxShadow:"0 4px 15px rgba(39,174,96,0.25)",marginBottom:16}}>
        + Añadir pick
      </button>

      {/* Totales */}
      <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"12px 16px",display:"flex",justifyContent:"space-around"}}>
        <div style={{textAlign:"center"}}><div style={{color:"#6FCF97",fontWeight:700,fontSize:16}}>{stats.won}</div><div style={{fontSize:9,color:"#5A7F9A",letterSpacing:1}}>GANADAS</div></div>
        <div style={{textAlign:"center"}}><div style={{color:"#E74C3C",fontWeight:700,fontSize:16}}>{stats.lost}</div><div style={{fontSize:9,color:"#5A7F9A",letterSpacing:1}}>PERDIDAS</div></div>
        <div style={{textAlign:"center"}}><div style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:16,color:benColor(stats.totalBen)}}>{fmtEur(stats.totalBen)}</div><div style={{fontSize:9,color:"#5A7F9A",letterSpacing:1}}>BENEFICIO</div></div>
      </div>
    </div>
  );

  // ── Stats Tab ───────────────────────────────────────────────────────────────
  const StatsTab=()=>{
    const benSeries=(()=>{let acc=0;return enriched.filter(r=>r.resultado).map(r=>{acc+=(r.ben??0);return acc;});})();
    const minB=Math.min(0,...benSeries),maxB=Math.max(0,...benSeries);
    const range=maxB-minB||1;
    const W=340,H=70;
    const lastVal=benSeries.length?benSeries[benSeries.length-1]:0;

    return(
      <div style={{padding:"16px 12px"}}>
        {/* KPIs */}
        <div style={{fontSize:10,color:"#6FCF97",letterSpacing:3,textTransform:"uppercase",borderLeft:"3px solid #27AE60",paddingLeft:8,marginBottom:14}}>Rendimiento general</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
          {[
            {label:"Apuestas",val:stats.played,accent:"#3498DB",fmt:v=>v},
            {label:"% Acierto",val:stats.played?(stats.won/stats.played*100):0,accent:"#F39C12",fmt:fmtPct},
            {label:"Beneficio",val:stats.totalBen,accent:stats.totalBen>=0?"#27AE60":"#E74C3C",fmt:fmtEur},
            {label:"ROI",val:stats.roi,accent:stats.roi>=0?"#27AE60":"#E74C3C",fmt:fmtPct},
            {label:"Racha Máx W",val:stats.maxStreak,accent:"#9B59B6",fmt:v=>`${v} ✅`},
            {label:"Cuota Media",val:stats.avgCuota,accent:"#1ABC9C",fmt:v=>v.toFixed(2)},
          ].map(({label,val,accent,fmt})=>(
            <div key={label} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${accent}33`,borderTop:`3px solid ${accent}`,borderRadius:8,padding:"12px"}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:700,color:accent}}>{fmt(val)}</div>
              <div style={{fontSize:9,color:"#5A7F9A",letterSpacing:1,textTransform:"uppercase",marginTop:2}}>{label}</div>
            </div>
          ))}
        </div>

        {/* Por tipo */}
        <div style={{fontSize:10,color:"#6FCF97",letterSpacing:3,textTransform:"uppercase",borderLeft:"3px solid #27AE60",paddingLeft:8,marginBottom:12}}>Por tipo de pick</div>
        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}>
          {stats.byPick.map((p,i)=>(
            <div key={p.name} style={{background:i%2===0?"rgba(255,255,255,0.03)":"transparent",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:"10px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:11,fontWeight:600}}>{p.name}</div>
              <div style={{display:"flex",gap:12,fontFamily:"'DM Mono',monospace",fontSize:11}}>
                <span style={{color:"#5A7F9A"}}>{p.total} ap.</span>
                <span style={{color:"#6FCF97"}}>{p.won}W</span>
                <span style={{fontWeight:700,color:benColor(p.ben)}}>{p.total>0?fmtEur(p.ben):"—"}</span>
              </div>
            </div>
          ))}
        </div>

        {/* Últimas 5 */}
        <div style={{fontSize:10,color:"#6FCF97",letterSpacing:3,textTransform:"uppercase",borderLeft:"3px solid #27AE60",paddingLeft:8,marginBottom:12}}>Últimas 5 apuestas</div>
        {stats.last5.length===0
          ?<div style={{color:"#3A5A7A",fontSize:12,padding:12,textAlign:"center"}}>Sin apuestas registradas aún.</div>
          :<div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}>
            {stats.last5.map(r=>(
              <div key={r.id} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"10px 12px",borderLeft:`3px solid ${resColor(r.resultado)}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:12,fontWeight:600,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.partido||"—"}</div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:13,color:benColor(r.ben),marginLeft:8}}>{fmtEur(r.ben)}</div>
                </div>
                <div style={{fontSize:10,color:"#5A7F9A",marginTop:3}}>{r.pick} · cuota {r.cuota||"—"}</div>
              </div>
            ))}
          </div>
        }

        {/* Curva */}
        {benSeries.length>=2&&(
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"14px"}}>
            <div style={{fontSize:10,color:"#6FCF97",letterSpacing:3,textTransform:"uppercase",marginBottom:10}}>Curva de beneficio</div>
            <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:70}}>
              <defs>
                <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor={lastVal>=0?"#27AE60":"#E74C3C"} stopOpacity="0.25"/>
                  <stop offset="100%" stopColor={lastVal>=0?"#27AE60":"#E74C3C"} stopOpacity="0"/>
                </linearGradient>
              </defs>
              <line x1="0" y1={H-((0-minB)/range)*(H-10)-5} x2={W} y2={H-((0-minB)/range)*(H-10)-5} stroke="rgba(255,255,255,0.1)" strokeWidth="1" strokeDasharray="3,3"/>
              <polyline points={benSeries.map((v,i)=>`${(i/(benSeries.length-1))*W},${H-((v-minB)/range)*(H-10)-5}`).join(" ")} fill="none" stroke={lastVal>=0?"#27AE60":"#E74C3C"} strokeWidth="2" strokeLinejoin="round"/>
            </svg>
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0B1626 0%,#0F2040 50%,#0B1A30 100%)"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(90deg,#0D3B26,#1A5C38,#0D3B26)",borderBottom:"2px solid #27AE60",padding:"14px 16px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        <div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:700,color:"#fff",textShadow:"0 0 20px rgba(39,174,96,0.5)"}}>⚽ G3 ELITE TRACKER</div>
          <div style={{fontSize:9,color:"#6FCF97",letterSpacing:2,marginTop:1}}>SISTEMA TERCERA · APUESTAS DE VALOR</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:18,color:benColor(stats.totalBen),fontWeight:700}}>{fmtEur(stats.totalBen)}</div>
          <div style={{fontSize:8,color:"#5A7F9A",letterSpacing:1}}>BENEFICIO</div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.07)",position:"sticky",top:58,zIndex:49,background:"#0B1626"}}>
        {[["picks","📋 PICKS"],["stats","📊 STATS"]].map(([k,label])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{flex:1,padding:"10px",fontSize:11,fontWeight:600,letterSpacing:1,cursor:"pointer",border:"none",background:tab===k?"rgba(39,174,96,0.1)":"transparent",color:tab===k?"#6FCF97":"#5A7F9A",borderBottom:tab===k?"2px solid #27AE60":"2px solid transparent"}}>
            {label}
          </button>
        ))}
      </div>

      {tab==="picks"?<PicksTab/>:<StatsTab/>}
      <Modal/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
